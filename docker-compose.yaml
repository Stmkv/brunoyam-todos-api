services:
  db:
    image: postgres:18
    container_name: postgres
    restart: always
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  app:
    build: .
    container_name: todos-api
    depends_on:
      - db
    env_file: .env
    ports:
      - "8080:8080"

  pgbouncer:
    image: edoburu/pgbouncer
    environment:
      - DATABASE_URL=${PGBOUNCER_DATABASE_URL}
      - POOL_MODE=${POOL_MODE}
      - MAX_CLIENT_CONN=${MAX_CLIENT_CONN}
      - DEFAULT_POOL_SIZE=${DEFAULT_POOL_SIZE}
      - RESERVER_POOL_SIZE=${RESERVER_POOL_SIZE}
      - SERVER_IDLE_TIMEOUT=${SERVER_IDLE_TIMEOUT}
      - AUTH_TYPE=${AUTH_TYPE}
    ports:
      - "6432:5432"
    depends_on:
      - db

volumes:
  postgres_data: