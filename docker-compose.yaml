services:
  db:
    image: postgres:18
    container_name: postgres
    restart: always
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  app:
    build: .
    container_name: todos-api
    depends_on:
      - db
    env_file: .env
    ports:
      - "8080:8080"

volumes:
  postgres_data: